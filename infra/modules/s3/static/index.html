<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>서비스 점검 중 | K-Beauty</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f8f4f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #333;
    }
    .container {
      text-align: center;
      padding: 60px 40px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      max-width: 480px;
      width: 90%;
    }
    .icon { font-size: 64px; margin-bottom: 24px; }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 12px; color: #222; }
    p { font-size: 16px; color: #666; line-height: 1.6; margin-bottom: 8px; }
    .badge {
      display: inline-block;
      margin-top: 24px;
      padding: 6px 16px;
      background: #f0e8ff;
      color: #7c3aed;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🛠️</div>
    <h1>서비스 점검 중입니다</h1>
    <p>더 나은 서비스를 위해 시스템을 점검하고 있습니다.</p>
    <p>잠시 후 다시 이용해 주세요.</p>
    <span class="badge">DR 복구 진행 중</span>
  </div>
</body>
</html>
