name: DR Activation

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  dr-apply:
    runs-on: ubuntu-latest
    environment: dr-production

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - uses: azure/setup-helm@v4
        with:
          version: "latest"

      - name: Install eksctl
        run: |
          ARCH=amd64
          PLATFORM="$(uname -s)_${ARCH}"
          curl -sSL "https://github.com/eksctl-io/eksctl/releases/latest/download/eksctl_${PLATFORM}.tar.gz" | tar xz -C /tmp
          sudo mv /tmp/eksctl /usr/local/bin/eksctl

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DR_ROLE_ARN }}
          aws-region: ap-northeast-2

      # DR 승인 시 헬스체크 알람 억제
      - name: Suppress health check alerts
        run: |
          aws lambda update-function-configuration \
            --function-name fn-azsis-kbeauty-dr-health-checker \
            --environment "Variables={AZURE_AGW_FQDN=${{ secrets.AZURE_AGW_FQDN }},SLACK_WEBHOOK_URL=${{ secrets.SLACK_WEBHOOK_URL }},SUPPRESS_ALERTS=true}" \
            --region ap-northeast-2

      # 1단계: dr/ 배포 (NAT GW → ECR → EKS)
      - name: Deploy DR Infrastructure
        working-directory: infra/dr
        run: |
          terraform init
          terraform apply -auto-approve

      # 2단계: kubectl 설정
      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --region ap-northeast-2 \
            --name azsis-kbeauty-dr-eks

      # 3단계: ALB Ingress Controller 설치 (EKS ALB 생성용)
      - name: Install ALB Ingress Controller
        run: |
          eksctl utils associate-iam-oidc-provider \
            --region ap-northeast-2 \
            --cluster azsis-kbeauty-dr-eks \
            --approve

          eksctl delete iamserviceaccount \
            --cluster azsis-kbeauty-dr-eks \
            --region ap-northeast-2 \
            --namespace kube-system \
            --name aws-load-balancer-controller \
            --wait || true

          eksctl create iamserviceaccount \
            --cluster azsis-kbeauty-dr-eks \
            --region ap-northeast-2 \
            --namespace kube-system \
            --name aws-load-balancer-controller \
            --role-name AmazonEKSLoadBalancerControllerRole \
            --attach-policy-arn arn:aws:iam::946775837287:policy/AWSLoadBalancerControllerIAMPolicy \
            --approve \
            --override-existing-serviceaccounts

          helm repo add eks https://aws.github.io/eks-charts
          helm repo update
          helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
            -n kube-system \
            --set clusterName=azsis-kbeauty-dr-eks \
            --set region=ap-northeast-2 \
            --set vpcId=vpc-0edcede2943a173a4 \
            --set serviceAccount.create=false \
            --set serviceAccount.name=aws-load-balancer-controller

          kubectl rollout status deployment/aws-load-balancer-controller \
            -n kube-system \
            --timeout=180s

      # 4단계: 앱 배포 (ALB 생성됨)
      - name: Deploy Application
        run: |
          kubectl apply -k k8s

      # 5단계: ALB DNS 확인 (생성까지 대기)
      - name: Wait for ALB DNS
        id: alb
        run: |
          for i in $(seq 1 20); do
            DNS=$(kubectl get ingress -A \
              -o jsonpath='{.items[0].status.loadBalancer.ingress[0].hostname}' 2>/dev/null)
            if [ -n "$DNS" ]; then
              echo "alb_dns=$DNS" >> $GITHUB_OUTPUT
              break
            fi
            echo "대기 중... ($i/20)"
            sleep 30
          done

          if [ -z "$DNS" ]; then
            echo "ALB DNS was not created in time."
            exit 1
          fi

      # 6단계: CloudFront에 EKS ALB 주소 등록
      - name: Update CloudFront with EKS ALB
        working-directory: infra/core
        run: |
          terraform init
          terraform apply -auto-approve \
            -var="eks_alb_dns=${{ steps.alb.outputs.alb_dns }}"

      # 7단계: 알람 억제 해제
      - name: Re-enable health check alerts
        if: always()
        run: |
          aws lambda update-function-configuration \
            --function-name fn-azsis-kbeauty-dr-health-checker \
            --environment "Variables={AZURE_AGW_FQDN=${{ secrets.AZURE_AGW_FQDN }},SLACK_WEBHOOK_URL=${{ secrets.SLACK_WEBHOOK_URL }},SUPPRESS_ALERTS=false}" \
            --region ap-northeast-2